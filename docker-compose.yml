services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:${FLARESOLVERR_IMAGE_VERSION}
    ports:
      - "${FLARESOLVERR_PORT}:${FLARESOLVERR_PORT}"
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL}
      - CAPTCHA_SOLVING=${FLARESOLVERR_CAPTCHA_SOLVING:-false}
      - HEADLESS=true
      - BROWSER_TIMEOUT=${FLARESOLVERR_BROWSER_TIMEOUT}
    networks:
      - internal
    restart: unless-stopped

  hltv-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - API_PORT=${API_PORT}
      - FLARESOLVERR_HOST=flaresolverr
      - FLARESOLVERR_PORT=${FLARESOLVERR_PORT}
      - RATE_LIMITING_ENABLE=${RATE_LIMITING_ENABLE}
      - RATE_LIMITING_FREQUENCY=${RATE_LIMITING_FREQUENCY}
    depends_on:
      - flaresolverr
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge