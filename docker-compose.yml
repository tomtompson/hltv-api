services:
  flaresolverr:
    image: anilcancakir/flaresolverr:v3.6.0
    environment:
      - LOG_LEVEL=info
      - DRIVER=nodriver
      - BROWSER_TIMEOUT=60000
    ports:
      - "8191:8191"
    restart: unless-stopped

  hltv-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
    depends_on:
      - flaresolverr
    restart: unless-stopped
